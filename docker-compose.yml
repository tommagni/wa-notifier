services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: datadog-agent
    restart: always
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - ENV_NAME=${ENV_NAME:-unknown}
      - DD_SERVICE=wa-llm
      - DD_LOGS_ENABLED=true
      - DD_APM_ENABLED=false
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_EXCLUDE=name:datadog-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro

  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres
    restart: always

  web-server:
    extends:
      file: docker-compose.base.yml
      service: web-server
    restart: always
    depends_on:
      - datadog-agent
      - postgres
      - whatsapp
    environment:
      - DB_URI=postgresql+asyncpg://user:password@postgres:5432/postgres
      - WHATSAPP_HOST=http://whatsapp:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice:v7.11.4
    container_name: whatsapp
    labels:
      com.datadoghq.tags.service: "wa-llm-whatsapp"
      com.datadoghq.tags.env: "${ENV_NAME:-unknown}"
      com.datadoghq.tags.version: "dev"
      com.datadoghq.ad.logs: '[{"source":"go","service":"wa-llm-whatsapp"}]'
    ports:
      - "3003:3003"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - wa_llm_whatsapp:/app/storages
    environment:
      - APP_PORT=3003
      - APP_OS=Chrome
      - DB_URI=postgres://user:password@postgres:5432/webhook_db?sslmode=disable
      - APP_BASIC_AUTH=admin:admin
      - WHATSAPP_CHAT_STORAGE=false
      - WHATSAPP_WEBHOOK=http://web-server:5001/webhook

volumes:
  wa_llm_whatsapp:
    name: wa_llm_whatsapp
  wa_llm_postgres:
    name: wa_llm_postgres
